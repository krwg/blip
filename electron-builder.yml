appId: com.blip.messenger
productName: BLIP
copyright: Copyright © 2026 Floke Studio
extraMetadata:
  CompanyName: Floke Studio
  FileDescription: BLIP — P2P LAN Messenger
  ProductName: BLIP
  LegalCopyright: Copyright © 2026 Floke Studio
publish:
  - provider: github
    owner: FlokeStudio
    repo: BLIP
    releaseType: release
directories:
  output: dist-electron
  buildResources: build
afterPack: scripts/obfuscate-after-pack.cjs
files:
  - main/**/*
  - shared/**/*
  - preload.cjs
  - dist/**/*
  - package.json
  - app-metadata.json
extraResources:
  - from: build/giphy-api-key.txt
    to: giphy-api-key.txt
  - from: build/mesh-plus-public-key.txt
    to: mesh-plus-public-key.txt
  - from: build/build-info.json
    to: build-info.json
  - from: build/icon.png
    to: icons/icon.png
  - from: build/tray-16.png
    to: icons/tray-16.png
  - from: build/icons
    to: icons
    filter:
      - '**/*'
win:
  icon: icon.ico
  # Display name for unsigned installers; Authenticode subject may still read krwg on older signed builds.
  publisherName: Floke Studio
  legalTrademarks: BLIP
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  installerIcon: icon.ico
  uninstallerIcon: icon.ico
  installerHeaderIcon: icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BLIP
  # false = show “Launch BLIP” checkbox on finish page (customFinishPage defines MUI_FINISHPAGE_RUN)
  runAfterFinish: false
  uninstallDisplayName: BLIP
  artifactName: ${productName}-Setup-${version}.${ext}
  displayLanguageSelector: true
  multiLanguageInstaller: true
  menuCategory: Chat
  installerLanguages:
    - en_US
    - ru_RU
  include: build/installer.nsh
  license: LICENSE
portable:
  artifactName: ${productName}-${version}-Portable.${ext}

fileAssociations:
  - ext: blip
    name: BLIPSeed
    description: BLIP Mesh Seed
    mimeType: application/vnd.blip.seed+json
    role: Editor
    icon: icon.ico

protocols:
  - name: BLIP
    schemes:
      - blip
